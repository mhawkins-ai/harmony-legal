<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony • Legal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-serif {
            font-family: 'Playfair Display', Georgia, serif;
        }
    </style>
</head>
<body class="bg-[#f9f7f2] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-14 h-14 bg-[#14532d] rounded-3xl flex items-center justify-center shadow-inner">
                    <span class="text-white text-4xl font-bold tracking-tighter">H</span>
                </div>
                <div>
                    <span class="font-semibold text-5xl tracking-tighter text-[#14532d]">Harmony</span>
                </div>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-semibold tracking-tight text-[#14532d]">Legal Documents</h1>
            <p class="mt-3 text-[#6b6b5f]">Privacy Policy and Terms of Service</p>
        </div>

        <div class="space-y-4">
            <!-- Privacy Card -->
            <a href="/privacy" 
               class="group block bg-white border border-[#e5e5e0] rounded-3xl p-6 hover:border-[#14532d] transition-all hover:shadow-md">
                <div class="flex items-start gap-x-4">
                    <div class="mt-1 w-10 h-10 flex-shrink-0 bg-[#f1ede3] rounded-2xl flex items-center justify-center group-hover:bg-[#14532d] transition-colors">
                        <i class="fa-solid fa-shield-halved text-[#14532d] group-hover:text-white text-xl transition-colors"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-xl text-[#14532d]">Privacy Policy</h3>
                        <p class="mt-1.5 text-sm text-[#6b6b5f]">How we collect, use, and protect your information</p>
                        <div class="mt-4 text-xs inline-flex items-center gap-x-1.5 text-[#b8860b]">
                            <span>Read document</span>
                            <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-0.5 transition-transform"></i>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Terms Card -->
            <a href="/terms" 
               class="group block bg-white border border-[#e5e5e0] rounded-3xl p-6 hover:border-[#14532d] transition-all hover:shadow-md">
                <div class="flex items-start gap-x-4">
                    <div class="mt-1 w-10 h-10 flex-shrink-0 bg-[#f1ede3] rounded-2xl flex items-center justify-center group-hover:bg-[#14532d] transition-colors">
                        <i class="fa-solid fa-file-contract text-[#14532d] group-hover:text-white text-xl transition-colors"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-xl text-[#14532d]">Terms of Service</h3>
                        <p class="mt-1.5 text-sm text-[#6b6b5f]">Rules and guidelines for using Harmony</p>
                        <div class="mt-4 text-xs inline-flex items-center gap-x-1.5 text-[#b8860b]">
                            <span>Read document</span>
                            <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-0.5 transition-transform"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <div class="mt-10 text-center">
            <p class="text-xs text-[#9c9c8f]">© Harmony — A calm space for interfaith understanding</p>
        </div>
    </div>
</body>
</html>
